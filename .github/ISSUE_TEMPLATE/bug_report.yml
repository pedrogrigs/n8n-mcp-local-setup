name: Bug report
description: Report a problem installing or running local n8n-mcp.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste your n8n API key or local bearer token.
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: Remove secrets before submitting.
      render: shell
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste relevant output from `doctor`, with secrets removed.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

